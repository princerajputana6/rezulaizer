name = "rezulyzer-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Set your account/project identifiers via environment or GitHub Actions secrets
# CLOUDFLARE_ACCOUNT_ID, CF_API_TOKEN

[[d1_databases]]
binding = "DB"
database_name = "rezulyzer"
database_id = "eba9a007-3a29-4785-bb39-abf2c57d45c7"

[[r2_buckets]]
binding = "R2"
bucket_name = "rezulyzer"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ce1d87fdc3004ae3b3fb3ef3a5cda6ab"

# Durable Objects (optional for sessions/locks)
# [[durable_objects.bindings]]
# name = "SESSION_DO"
# class_name = "SessionDO"

[vars]
CLIENT_URL = "http://localhost:3000"
JWT_ISSUER = "rezulyzer"
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
CF_CRON_TOKEN = "cron-secret-token"
ANTHROPIC_API_KEY = ""
ANTHROPIC_MODEL = "claude-sonnet-4-20250514"
RESEND_API_KEY = ""
RESEND_FROM_EMAIL = ""
